bio: |-
  浮田 嵩祐です．AIに関する研究をしているPhD学生です．
  生成AIの効率化や基盤モデル構築などの深層学習領域や，機械学習の基礎理論やGrokkingなどの学習ダイナミクスに関心を持っています．
  最近はFlow Matchingを中心に研究しています．
bioen: |-
  I am Kosuke Ukita, PhD student researching AI.
  My research interests include deep learning topics such as efficient generative AI and foundation model construction, as well as learning dynamics such as the fundamentals of machine learning and Grokking.
  Recently, I have been focusing on Flow Matching.

