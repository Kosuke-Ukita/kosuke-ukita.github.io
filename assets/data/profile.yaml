bio: |-
  浮田 嵩祐です．AIに関する研究をしているPhD学生です．

  深層学習での応用や機械学習の理論的な基礎研究にも関心を持っています．
  - 生成AIの効率化・基盤モデルの構築
  - 機械学習理論やGrokking等の学習ダイナミクス

  最近はFlow Matchingを中心に研究しています．
bioen: |-
  I am Kosuke Ukita, a PhD student researching AI.

  I am interested in both practical applications of deep learning and theoretical research in machine learning:
  - Efficient generative AI and foundation model construction
  - Machine learning theory and learning dynamics (e.g., Grokking)

  Recently, I have been focusing on Flow Matching.

